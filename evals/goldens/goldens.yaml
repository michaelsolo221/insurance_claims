      - user: "Hi, I'd like to report a claim."
        agent: "Could I get your full name, please?"

      - user: "Priya Patel."
        agent: "What's the best phone number to reach you on?"
        tool_calls:
          - action: set_caller_name
            args:
              caller_name: "Priya Patel"

      - user: "0398 765 432."
        agent: "Do you have your CGU policy number handy? That's fine to skip if you don't have it."
        tool_calls:
          - action: set_callback_phone
            args:
              phone_number: "0398 765 432"
    expectations:
      - "When telephony-caller-id is absent, the agent must ask for the callback phone number verbally instead of presenting a pre-filled number for confirmation."
      - "The callback phone number must be asked for in its normal slot order (after name), not treated specially."
    tags: [P1, MEDIUM, callback-phone-fallback, telephony, "§12", insurance_claims, audio, fnol]

  # ===========================================================================
  # CUJ 5 -- Optional field omitted does not block progress (tdd.md Coverage
  # Map row 5). P1, HIGH. Demonstrates the policy_number skip; callback_window
  # follows the identical orchestrator code path (_run_slot_filling's
  # not-required branch marks it "not_captured" on a single decline, no
  # attempts counter), so exercising one optional slot is sufficient to
  # validate the mechanism without duplicating a second full slot walk.
  # ===========================================================================
  - conversation: fnol_optional_field_skipped
    session_parameters:
      telephony-caller-id: ""
    turns:
      - user: "<event>welcome</event>"
        agent: "Good day, you've reached CGU express claim lodgements, my name is Amanda, how can I help you?"

      - user: "I'd like to report a claim."
        agent: "Could I get your full name, please?"

      - user: "Maria Chen."
        agent: "What's the best phone number to reach you on?"
        tool_calls:
          - action: set_caller_name
            args:
              caller_name: "Maria Chen"

      - user: "0455 111 222."
        agent: "Do you have your CGU policy number handy? That's fine to skip if you don't have it."
        tool_calls:
          - action: set_callback_phone
            args:
              phone_number: "0455 111 222"

      - user: "No, I don't have it handy."
        agent: "When did the incident happen -- the date and approximate time?"
    expectations:
      - "Declining to provide the optional policy number must not block progression to the next required field (incident date/time)."
      - "The agent must not re-ask for the policy number after the caller declines it once."
    tags: [P1, HIGH, fnol-optional-field, slot-filling, "§6", "§11", insurance_claims, audio, fnol]

  # ===========================================================================
  # CUJ 6 -- Required-field retry exhaustion (tdd.md Coverage Map row 6).
  # P1, HIGH. 3 total attempts (the original ask + 2 retries) per the
  # confirmed retry policy, then the orchestrator proceeds without blocking.
  # ===========================================================================
  - conversation: retry_exhaustion_required_field
    session_parameters:
      telephony-caller-id: ""
    turns:
      - user: "<event>welcome</event>"
        agent: "Good day, you've reached CGU express claim lodgements, my name is Amanda, how can I help you?"

      - user: "Hi, I want to report a claim."
        agent: "Could I get your full name, please?"

      - user: "I'd rather not say."
        agent: "Could I get your full name, please?"

      - user: "I really don't want to give my name."
        agent: "Could I get your full name, please?"

      - user: "No, I won't tell you."
        agent: "What's the best phone number to reach you on?"
    expectations:
      - "After 3 total attempts (the original ask plus 2 retries) to get the caller's name, the agent must stop asking and move on to the next required field instead of blocking the call."
      - "The agent must not ask a fourth time for the caller's name in this conversation."
    tags: [P1, HIGH, retry-exhaustion, slot-filling, "§11", insurance_claims, audio, fnol]

  # ===========================================================================
  # CUJ 7 -- Mandatory readback/confirmation before submission (tdd.md
  # Coverage Map row 7). P0, HIGH. Distinct from the happy path: this
  # exercises a mid-readback CORRECTION, which re-opens the recap
  # (instruction.txt's Final_Readback_Confirmation step 3 /
  # _run_slot_filling's re-presented readback message), rather than an
  # immediate confirmation.
  # ===========================================================================
  - conversation: readback_confirmation_with_correction
    session_parameters:
      telephony-caller-id: ""
    turns:
      - user: "<event>welcome</event>"
        agent: "Good day, you've reached CGU express claim lodgements, my name is Amanda, how can I help you?"

