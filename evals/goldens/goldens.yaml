# =============================================================================
# GOLDEN EVALS -- insurance_claims (root_agent, "Amanda")
#
# Source: tdd.md (APPROVED) Coverage Map, rows where Eval Type == Golden.
# Grounded in cxas_app/insurance_claims/agents/root_agent/root_agent.json,
# app.json, instruction.txt, and the before_model_callbacks_01 /
# after_model_callbacks_01 python_code.py (the Slot-Filling DAG Framework).
#
# GROUNDING MANIFEST (do not reference anything outside this list):
#   Real tools:     set_caller_name, set_callback_phone, set_policy_number,
#                    set_incident_datetime, set_incident_location,
#                    set_incident_description, set_injury_flag,
#                    set_hazard_flag, set_callback_window, flag_emergency,
#                    submit_claim_notification, end_session
#   Real agents:    root_agent only (no childAgents -- single-agent app)
#   Real variables: telephony-caller-id, _emergency_flag,
#                    claim_notification_draft, _system_message,
#                    _submission_acknowledged
#
# IMPORTANT ASSUMPTIONS / KNOWN GAPS (flagged, not silently papered over):
#
# 1. claim_notification_draft, _emergency_flag, _system_message, and
#    _submission_acknowledged are orchestrator/callback-derived state --
#    per app.json's variable descriptions they must NEVER be set in
#    session_parameters. Only telephony-caller-id is a legitimate per-CUJ
#    session parameter (it drives the pre-fill-vs-verbal-capture branch,
#    tdd.md Section 12). Because claim_notification_draft can't be seeded,
#    every golden that needs to reach the readback/submission phase must
#    walk all 9 FNOL slots turn-by-turn -- there is no shortcut.
#
# 2. submit_claim_notification's real python_code.py makes a live
#    `google.cloud.firestore` call with no mocking hook exposed at the
#    golden-YAML level (tdd.md's Known Issues section flags the Firestore/
#    Cloud Task infra wiring as still-open). The Coverage Map rows for
#    "FNOL happy path" and "readback confirmation" assume a MOCKED
#    Firestore SUCCESS, and "Firestore write failure" assumes a MOCKED
#    Firestore FAILURE -- these goldens are written to that assumption.
#    Whoever runs this suite must ensure the eval execution environment
#    (not this YAML) mocks the Firestore client accordingly; absent that
#    mock, the tool's real code will raise (no credentials in a bare
#    sandbox) and every golden will observe the FAILURE branch instead,
#    including the ones meant to prove the SUCCESS branch. Surfaced here
#    for the main thread/stakeholder, not fabricated away.
#
# 3. FIXED (2026-07-05): _run_slot_filling() in before_model_callbacks_01
#    previously had a callback_phone pre-fill confirmation loop bug where
#    the "confirm your callback number" message fired unconditionally on
#    every turn with no way to promote callback_phone from "pending" to
#    "confirmed" before Phase 2 readback — the agent would re-ask the
#    phone confirmation on every turn, blocking progression to other
#    slots. Fixed by adding a dedicated pre-fill confirmation sub-phase
#    that runs BEFORE Phase 1 collection: a caller's spoken "yes" promotes
#    callback_phone to "confirmed" immediately, and slot-filling moves on
#    to the next unfilled slot. The callback_phone_prefill_readback golden
#    can now be extended beyond the single initial turn into a full
#    happy-path sequence (e.g., confirm phone -> collect other slots ->
#    readback -> submit). Marked for eval-writer follow-up in a future
#    gate-5 dispatch — out of scope for this bug-fix pass.
# =============================================================================

common_session_parameters:
  # No variable is safe to share as a blanket default here: the only
  # legitimate externally-supplied session parameter (telephony-caller-id)
  # varies deliberately per CUJ (present vs. absent), and every other
  # declared variable (_emergency_flag, claim_notification_draft,
  # _system_message, _submission_acknowledged) must NEVER be set by an
  # eval per app.json's variable descriptions -- they are derived only.
  {}

conversations:
  # ===========================================================================
  # CUJ 1 -- Fixed greeting (tdd.md Coverage Map row 1)
  # P0, HIGH. Deterministic, callback-enforced opening line (before_model_
  # callback's PRIORITY 1 check on "<event>session start</event>").
  # ===========================================================================
  - conversation: greeting_fixed_amanda_persona
    session_parameters: {}
    turns:
      - user: "<event>welcome</event>"
        agent: "Good day, you've reached CGU express claim lodgements, my name is Amanda, how can I help you?"
    expectations:
      - "The agent's very first utterance must be the exact scripted greeting naming the persona Amanda and 'CGU express claim lodgements'."
      - "The agent must not improvise a different opening line or skip the greeting."
    tags: [P0, HIGH, greeting, persona, "§12", insurance_claims, audio, fnol]

  # ===========================================================================
  # CUJ 2 -- FNOL happy path: all required + optional fields, readback
  # confirmed, Firestore write mocked to SUCCEED (tdd.md Coverage Map row 2).
  # P0, NO-GO. telephony-caller-id deliberately ABSENT so this golden walks
  # the plain sequential slot order without engaging the pre-fill branch
  # (see gap #3 above -- that branch is covered separately and more safely
  # by callback_phone_prefill_readback).
  # ===========================================================================
  - conversation: fnol_happy_path_full_capture
    session_parameters:
      telephony-caller-id: ""
    turns:
      - user: "<event>welcome</event>"
        agent: "Good day, you've reached CGU express claim lodgements, my name is Amanda, how can I help you?"

      - user: "Hi, I'd like to report a claim."
        agent: "Could I get your full name, please?"

      - user: "John Smith."
        agent: "Thanks, John. What's the best phone number to reach you on?"
        tool_calls:
          - action: set_caller_name
            args:
              caller_name: "John Smith"

      - user: "0412 345 678."
        agent: "Do you have your CGU policy number handy? That's fine to skip if you don't have it."
        tool_calls:
          - action: set_callback_phone
            args:
              phone_number: "0412 345 678"

      - user: "Yes, it's CGU-88213."
        agent: "When did the incident happen -- the date and approximate time?"
        tool_calls:
          - action: set_policy_number
            args:
              policy_number: "CGU-88213"

      - user: "Yesterday afternoon, around 3pm."
        agent: "Where did the incident happen?"
        tool_calls:
          - action: set_incident_datetime
            args:
              incident_datetime:
                $matchType: "ignore"
                $matchValue: ""
                $originalValue: ""

      - user: "On the corner of George Street and Market Street in Sydney."
        agent: "Can you tell me what happened?"
        tool_calls:
          - action: set_incident_location
            args:
              incident_location:
                $matchType: "semantic"
                $matchValue: "The corner of George Street and Market Street in Sydney"
                $originalValue: ""

      - user: "A car ran a red light and hit my car -- just a fender bender."
        agent: "Was anyone injured?"
        tool_calls:
          - action: set_incident_description
            args:
              incident_description:
                $matchType: "semantic"
                $matchValue: "A car ran a red light and hit the caller's car, a minor collision"
                $originalValue: ""

      - user: "No, no injuries."
        agent: "Is there an ongoing hazard at the scene right now, like a safety risk to others?"
        tool_calls:
          - action: set_injury_flag
            args:
              injury_occurred: false

      - user: "No, it's all cleared up now."
        agent: "Is there a particular time of day that's best for us to call you back? That's optional."
        tool_calls:
          - action: set_hazard_flag
            args:
              hazard_present: false

      - user: "Weekday afternoons work best."
        agent: "So just to confirm everything I've got: your name is John Smith, the best number to reach you is 0412 345 678, your policy number is CGU-88213, the incident happened yesterday afternoon around 3pm, at the corner of George Street and Market Street in Sydney, where a car ran a red light and hit your car in a minor collision, nobody was injured, there's no ongoing hazard, and weekday afternoons work best for a callback. Is all of that correct?"
        tool_calls:
          - action: set_callback_window
            args:
              callback_window:
                $matchType: "semantic"
                $matchValue: "Weekday afternoons"
                $originalValue: ""

      - user: "Yes, that's all correct."
        agent: "Thank you, your claim notification has been lodged. A CGU claims consultant will follow up with you soon. Take care."
        tool_calls:
          - action: submit_claim_notification
            args: {}
          - action: end_session
            args:
              session_escalated: false
    expectations:
      - "The agent must capture all 9 FNOL fields one at a time, never asking for more than one piece of information per turn."
      - "The agent must read back the full set of captured details and get explicit confirmation before calling submit_claim_notification."
      - "The agent must call submit_claim_notification only once, only after the caller confirms the readback."
      - "On a successful submission, the agent must speak an explicit success acknowledgment and end the call."
    tags: [P0, "NO-GO", fnol-happy-path, slot-filling, "§1", "§6", "§7", "§11", "§12", insurance_claims, audio, fnol]

  # ===========================================================================
  # CUJ 3 -- Callback phone pre-fill from telephony-caller-id (tdd.md
  # Coverage Map row 3). P1, MEDIUM. Gap #3 (callback_phone pre-fill
  # confirmation loop) has been fixed — this golden can now be extended
  # into a full pre-fill happy-path sequence (confirm -> collect ->
  # readback -> submit). Marked for eval-writer gate-5 follow-up.
  # ===========================================================================
  - conversation: callback_phone_prefill_readback
    session_parameters:
      telephony-caller-id: "0412 987 654"
    turns:
      - user: "<event>welcome</event>"
        agent: "Good day, you've reached CGU express claim lodgements, my name is Amanda, how can I help you?"

      - user: "Hi, I'd like to report a claim."
        agent: "Can I confirm the best callback number is 0412 987 654?"
    expectations:
      - "When telephony-caller-id is present, the agent must read back that number and ask the caller to confirm it, rather than asking for a callback number cold."
      - "The agent must not call set_callback_phone before the caller has responded to the read-back."
    tags: [P1, MEDIUM, callback-phone-prefill, telephony, "§12", insurance_claims, audio, fnol]

  # ===========================================================================
  # CUJ 4 -- Callback phone fallback: telephony-caller-id absent/empty
  # (tdd.md Coverage Map row 4). P1, MEDIUM.
  # ===========================================================================
  - conversation: callback_phone_fallback_verbal_capture
    session_parameters:
      telephony-caller-id: ""
    turns:
      - user: "<event>welcome</event>"
