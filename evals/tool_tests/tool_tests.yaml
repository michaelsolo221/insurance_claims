# Tool tests for insurance_claims (CGU express claim lodgement voice agent).
#
# Grounded against tdd.md's Tools section and the actual tool source under
# cxas_app/insurance_claims/tools/<name>/python_function/python_code.py.
# Response keys below are copied verbatim from each tool's `return` statements
# -- not guessed. Tool display names are copied verbatim from app.json's
# top-level `tools` array (all 11 confirmed present, no fabrication needed).
#
# Coverage: all 9 FNOL slot setters (success + error branch(es) each),
# flag_emergency (success), submit_claim_notification (success path only --
# see the note above that test for why a Firestore-write-failure test is not
# included).

tests:
  # -------------------------------------------------------------------------
  # set_caller_name -- tools/set_caller_name/python_function/python_code.py
  # Returns {"stored": True, "value": <name>} on success, or
  # {"error": True, "error_code": "empty_value", "agent_action": <str>}.
  # -------------------------------------------------------------------------
  - name: set_caller_name_success
    tool: set_caller_name
    args:
      caller_name: "Jordan Reyes"
    expectations:
      response:
        - path: "$.result.stored"
          operator: equals
          value: true
        - path: "$.result.value"
          operator: equals
          value: "Jordan Reyes"

  - name: set_caller_name_empty_value_error
    tool: set_caller_name
    args:
      caller_name: ""
    expectations:
      response:
        - path: "$.result.error"
          operator: equals
          value: true
        - path: "$.result.error_code"
          operator: equals
          value: "empty_value"
        - path: "$.result.agent_action"
          operator: is_not_null

