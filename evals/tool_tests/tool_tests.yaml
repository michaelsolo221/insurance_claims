  # -------------------------------------------------------------------------
  # submit_claim_notification -- tools/submit_claim_notification/python_function/python_code.py
  # Takes no args; reads the full claim_notification_draft from context.state.
  # Two-step tool: (1) synchronous Firestore write -- the ONLY outcome
  # reflected in the return value; (2) fire-and-forget Cloud Task enqueue,
  # whose failure never changes the return value (caught and only logged).
  #
  # Success path: {"success": True, "claim_id": <str>}.
  # -------------------------------------------------------------------------
  - name: submit_claim_notification_success
    tool: submit_claim_notification
    args: {}
    variables:
      claim_notification_draft:
        caller_name: {value: "Jordan Reyes", status: "confirmed", attempts: 1}
        callback_phone: {value: "0412 345 678", status: "confirmed", attempts: 1}
        policy_number: {value: "", status: "not_captured"}
        incident_datetime: {value: "2026-07-03 14:30", status: "confirmed", attempts: 1}
        incident_location: {value: "42 Wattle Street, Parramatta", status: "confirmed", attempts: 1}
        incident_description: {value: "A tree branch fell on the parked car during a storm.", status: "confirmed", attempts: 1}
        injury_flag: {value: false, status: "confirmed", attempts: 1}
        hazard_flag: {value: false, status: "confirmed", attempts: 1}
        callback_window: {value: "", status: "not_captured"}
        readback_confirmed: true
    expectations:
      response:
        - path: "$.result.success"
          operator: equals
          value: true
        - path: "$.result.claim_id"
          operator: is_not_null

  # NOTE (real limitation, not fabricated): a deterministic
  # submit_claim_notification_firestore_failure test is NOT included above.
  # The tool's try/except (see python_code.py lines ~100-115) only catches
  # exceptions raised by a REAL `google.cloud.firestore.Client(...).set(...)`
  # call -- there is no `variables`/`args`-controlled branch, feature flag, or
  # monkeypatch seam in the tool code that a YAML `tests:` entry's `args` or
  # `variables` block can reach to force that call to fail. The YAML tool-test
  # format (per eval-templates.md's "Tool Tests" section) only supports
  # `args` (function kwargs) and `variables` (context.state seeding) -- it has
  # no mechanism to inject a mock Firestore/Cloud Tasks client, unlike the
  # callback-test format's sys.path + module-global mock-injection pattern.
  # Whether `submit_claim_notification_success` above actually returns
  # success=True therefore depends on real Firestore reachability/credentials
  # in whatever environment runs this suite (project graphic-tide-501406-p2,
  # database insurance-claims-fnol, collection claim_notifications per the
  # tool's module docstring) -- it is not a hermetic unit test. Forcing the
  # failure branch deterministically would require either (a) a code change
  # to the tool adding a test-injectable client/seam, or (b) covering this
  # path at the callback-test or integration-test layer instead. Flagging for
  # the main thread rather than fabricating a test that cannot actually
  # exercise the failure path.
